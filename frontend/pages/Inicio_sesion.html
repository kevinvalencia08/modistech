<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" crossorigin="anonymous">

    <!-- CSS propio -->
    <link rel="stylesheet" href="css/loquesea.css">

    <title>Inicio de sesión</title>
</head>

<body>
    <form>
        <div class="row justify-content-center m-3">
            <div class="form justify-content-center col-5 border border-secondary p-5">

                <!-- LOGO -->
                <a href="index.html">
                    <img class="img" src="img/logo_2.png" alt="logo">
                </a>

                <h5 class="title">Inicio de sesión</h5>

                <!-- EMAIL -->
                <label class="form-label mt-5">Correo Electronico</label>
                <input type="email" class="form-control">
                <div class="form-text">Ingresa un correo electrónico válido</div>

                <!-- PASSWORD -->
                <label class="form-label mt-5">Contraseña</label>
                <input type="password" class="form-control">
                <div class="form-text">Ingresa tu contraseña</div>

                <!-- BOTONES -->
                <button type="submit" class="btn btn-primary mb-1 mt-5 me-5 ms-5">
                    Iniciar Sesión
                </button>

                <button type="button" class="btn btn-secondary mb-1 mt-5 ms-5">
                    Registrarse
                </button>

            </div>
        </div>
    </form>
</body>
</html>
